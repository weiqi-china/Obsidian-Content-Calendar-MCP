vault_path: "./vault"
content_paths:
  - "20_Projects/Content_Production/**/01_作品区/*.md"
filename_pattern: "^(?<date>\\d{8})_(?<platform>[^_]+)_(?<account>[^_]+)_(?<product>[^_]+)_(?<direction>.+)\\.md$"
date_format: "yyyyMMdd"
frontmatter_mapping:
  title: "title"
  status: "status"
  publish_date: "publish_date"
  platform: "platform"
  account: "account"
  product: "product"
  batch: "batch"
  tags: "tags"
status_mapping:
  published:
    - "已发布"
    - "published"
    - "done"
  pending:
    - "待发布"
    - "pending"
    - "scheduled"
  draft:
    - "草稿"
    - "draft"
    - "wip"
    - "规划中"
date_formats:
  publish_date: "yyyy-MM-dd"
output:
  default_format: "json"
  date_format: "yyyy-MM-dd"
  timezone: "Asia/Shanghai"
